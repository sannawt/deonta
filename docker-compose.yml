# Run the same stack as localhost:8000 — share with: docker compose up --build
# Optional secrets: copy .env.example → .env.local (gitignored), then uncomment env_file below.

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      LEGAL_GRAPH_BACKEND: local
    # env_file:
    #   - .env.local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
